<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FODC Panel - Manage Users</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/pro_style.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.userRole = "{{ role }}";
        window.userName = "{{ user }}";
    </script>
    <style>
        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .table-container {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-glass);
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .limit-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .limit-input {
            width: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-family: inherit;
        }

        .limit-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-admin {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .role-user {
            background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .role-paid {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .role-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            width: 100%;
            cursor: pointer;
        }

        .role-select option {
            background: #1a1b1e;
        }

        .role-select:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div id="toast-container"></div>

    <!-- Header area -->
    <div class="page-container">
        <header class="header-content">
            <div class="logo">
                <i data-lucide="users" class="icon-primary"></i>
                <h1>FODC<span>Users</span></h1>
            </div>
            <div class="header-socials" style="display:flex; gap:1rem; align-items:center; margin-left:1rem;">
                <a href="https://t.me/fatherofbots_its" target="_blank" style="color:var(--primary)" title="Telegram"><i
                        data-lucide="send"></i></a>
                <a href="https://www.tiktok.com/@glorybotseller" target="_blank" style="color:var(--text-main)"
                    title="TikTok"><i data-lucide="video"></i></a>
                <a href="https://wa.me/8801938687923" target="_blank" style="color:#25D366"
                    title="WhatsApp (+8801938687923)"><i data-lucide="message-circle"></i></a>
            </div>
            <div class="header-actions">
                <div class="user-info">
                    <i data-lucide="user"></i>
                    <span>{{ user }} (<span class="role-text">{{ role }}</span>)</span>
                </div>
                <a href="/" class="btn btn-outline"><i data-lucide="arrow-left"></i> Back to Dashboard</a>
            </div>
        </header>

        <div
            style="background: var(--bg-panel); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border-glass); margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="margin: 0 0 0.5rem 0;">Global Settings</h3>
                <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Default max instances and auto-stop
                    CPU limit.</p>
            </div>
            <div style="display: flex; gap: 0.5rem; justify-content: flex-end; width: 100%;">
                <div class="limit-input-group" style="flex-shrink: 0;">
                    <div style="display:flex; flex-direction:column; gap:4px">
                        <label style="font-size:0.75rem; color:var(--text-muted)">Default Limit</label>
                        <input type="number" id="global-limit" class="limit-input" value="1" min="1"
                            title="Default Max Instances">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px">
                        <label style="font-size:0.75rem; color:var(--text-muted)">Max CPU (%)</label>
                        <input type="number" id="global-cpu-limit" class="limit-input" value="60" min="1" max="100"
                            title="Global CPU Auto-Stop Limit">
                    </div>
                    <button class="btn btn-primary" style="align-self: flex-end;" onclick="updateGlobalSettings()">
                        <i data-lucide="save"></i> Save Settings
                    </button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Max Instances Limit</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
            <div style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-glass); background: rgba(0, 0, 0, 0.2); display: flex; align-items: center; gap: 0.8rem;">
                <i data-lucide="search" style="color: var(--text-muted); width: 18px; height: 18px;"></i>
                <input type="text" id="user-search" placeholder="Search users by username..." style="width: 100%; background: transparent; border: none; color: white; font-size: 0.95rem; outline: none; padding: 0.5rem 0;" oninput="filterUsers()">
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];

        lucide.createIcons();

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}"></i> <span>${message}</span>`;

            container.appendChild(toast);
            lucide.createIcons();

            void toast.offsetWidth; // trigger reflow
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                    return;
                }
                const data = await res.json();

                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                } else {
                    showToast(data.error, 'error');
                }
            } catch (err) {
                showToast('Failed to load users', 'error');
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '';

            users.forEach(u => {
                const tr = document.createElement('tr');
                const roleClass = u.role === 'admin' ? 'role-admin' : (u.role === 'paid user' ? 'role-paid' : 'role-user');

                tr.innerHTML = `
                    <td><strong>${u.username}</strong></td>
                    <td>
                        <select class="role-select" onchange="updateRole('${u.username}', this.value)">
                            <option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="paid user" ${u.role === 'paid user' ? 'selected' : ''}>Paid User</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </td>
                    <td>
                        <div class="limit-input-group">
                            <input type="number" id="limit-${u.username}" class="limit-input" value="${u.max_instances}" min="1" ${u.role === 'admin' ? 'disabled' : ''}>
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
                            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem" onclick="updateLimit('${u.username}')" ${u.role === 'admin' ? 'disabled style="opacity:0.5"' : ''} title="Save Limit">
                                <i data-lucide="save" style="width:16px; height:16px"></i>
                            </button>
                            <button class="btn btn-warning" style="padding: 0.4rem 0.8rem" onclick="togglePauseUser('${u.username}', ${!!u.is_paused})" ${u.role === 'admin' ? 'disabled style="opacity:0.5"' : ''} title="${u.is_paused ? 'Resume User' : 'Pause User'}">
                                <i data-lucide="${u.is_paused ? 'play' : 'pause'}" style="width:16px; height:16px"></i>
                            </button>
                            <button class="btn btn-danger" style="padding: 0.4rem 0.8rem" onclick="deleteUser('${u.username}')" ${u.role === 'admin' ? 'disabled style="opacity:0.5"' : ''} title="Delete User">
                                <i data-lucide="trash-2" style="width:16px; height:16px"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function filterUsers() {
            const query = document.getElementById('user-search').value.toLowerCase();
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(query));
            renderUsers(filtered);
        }

        async function updateLimit(username) {
            const input = document.getElementById(`limit-${username}`);
            const limit = parseInt(input.value);

            if (isNaN(limit) || limit < 1) {
                showToast("Please enter a valid number greater than 0", "error");
                return;
            }

            try {
                const res = await fetch(`/api/admin/users/${username}/limit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ limit })
                });

                if (res.status === 401 || res.status === 403) {
                    showToast("Permission denied", "error");
                    return;
                }

                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                } else {
                    showToast(data.error || "Failed to update", 'error');
                }
            } catch (err) {
                showToast("Network error", "error");
            }
        }

        async function updateRole(username, role) {
            if (role === 'admin' && !confirm(`Are you sure you want to promote ${username} to ADMIN? This grants full access.`)) {
                fetchUsers(); // reset UI
                return;
            }

            try {
                const res = await fetch(`/api/admin/users/${username}/role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });

                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchUsers();
                } else {
                    showToast(data.error || "Failed to update role", 'error');
                }
            } catch (err) {
                showToast("Network error updating role", "error");
            }
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/admin/settings');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('global-limit').value = data.settings.default_max_instances || 1;
                    if (document.getElementById('global-cpu-limit')) {
                        document.getElementById('global-cpu-limit').value = data.settings.global_cpu_limit || 60;
                    }
                }
            } catch (e) {
                console.error("Failed to load settings");
            }
        }

        async function updateGlobalSettings() {
            const limit = parseInt(document.getElementById('global-limit').value);
            const cpuLimit = parseInt(document.getElementById('global-cpu-limit').value);

            if (isNaN(limit) || limit < 1 || isNaN(cpuLimit) || cpuLimit < 1) {
                showToast("Please enter a valid number greater than 0", "error");
                return;
            }

            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        default_max_instances: limit,
                        global_cpu_limit: cpuLimit
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                } else {
                    showToast(data.error || "Failed to update global settings", 'error');
                }
            } catch (err) {
                showToast("Network error", "error");
            }
        }

        async function togglePauseUser(username, isPaused) {
            const action = isPaused ? 'resume' : 'pause';
            if (!confirm(`Are you sure you want to ${action} user ${username}?`)) return;

            try {
                const res = await fetch(`/api/admin/users/${username}/${action}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`User ${username} ${action}d successfully.`, 'success');
                    fetchUsers();
                } else {
                    showToast(data.error || `Failed to ${action} user`, 'error');
                }
            } catch (err) {
                showToast("Network error", "error");
            }
        }

        async function deleteUser(username) {
            if (!confirm(`CRITICAL: Are you sure you want to DELETE user ${username} and ALL their instances? This CANNOT be undone.`)) return;

            try {
                const res = await fetch(`/api/admin/users/${username}/delete`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`User ${username} deleted.`, 'success');
                    fetchUsers();
                } else {
                    showToast(data.error || "Failed to delete user", 'error');
                }
            } catch (err) {
                showToast("Network error", "error");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchSettings();
            fetchUsers();
        });
    </script>
</body>

</html>
