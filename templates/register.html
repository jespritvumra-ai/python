<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FODC Panel - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/pro_style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 2rem;
            font-size: 2rem;
            font-weight: 800;
        }

        .login-card .logo {
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .error-msg {
            color: var(--danger);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .register-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i data-lucide="user-plus" class="icon-primary"></i>
                <h1>FODC<span>Register</span></h1>
            </div>
            <div class="header-socials"
                style="display:flex; gap:1rem; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <a href="https://t.me/fatherofbots_its" target="_blank" style="color:var(--primary)" title="Telegram"><i
                        data-lucide="send"></i></a>
                <a href="https://www.tiktok.com/@glorybotseller" target="_blank" style="color:var(--text-main)"
                    title="TikTok"><i data-lucide="video"></i></a>
                <a href="https://wa.me/8801938687923" target="_blank" style="color:#25D366"
                    title="WhatsApp (+8801938687923)"><i data-lucide="message-circle"></i></a>
            </div>
            <div id="error-box" class="error-msg"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="neon-input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="neon-input" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="margin-top:1rem">Create Account</button>
            </form>
            <a href="/login" class="register-link">Already have an account? Login here</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const form = document.getElementById('register-form');
        const errorBox = document.getElementById('error-box');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username.length < 3) {
                errorBox.textContent = "Username must be at least 3 characters";
                errorBox.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorBox.textContent = data.error;
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = "Server unreachable";
                errorBox.style.display = 'block';
            }
        };
    </script>
</body>

</html>
